{% extends "layout.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Exam Halls</h1>
</div>

<div class="form-card">
    <h3 style="margin-bottom: 1.5rem;">Add New Hall</h3>
    <form method="POST">
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label class="form-label">Hall Name / Number</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g., Main Auditorium">
            </div>
            <div class="form-group">
                <label class="form-label">Seating Capacity</label>
                <input type="number" min="1" name="capacity" class="form-control" required placeholder="e.g., 60">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Hall</button>
    </form>
</div>

<div class="form-card" style="margin-bottom: 2rem; border-color: var(--accent-color);">
    <h3 style="margin-bottom: 1.5rem; color: var(--accent-color);"><i class="fa-solid fa-file-csv"></i> Bulk Import via CSV</h3>
    <form method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr; gap: 1.5rem; align-items: end;">
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">Upload CSV File (Headers must be `name` and `capacity`)</label>
                <input type="file" name="csv_file" accept=".csv" class="form-control" required style="padding: 0.5rem 1rem;">
            </div>
        </div>
        <button type="submit" class="btn btn-success" style="margin-top: 1.5rem;">Import Halls</button>
    </form>
</div>

<div class="table-card">
    <table class="table">
        <thead>
            <tr>
                <th>Hall Name</th>
                <th>Capacity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for h in halls %}
            <tr>
                <td><strong>{{ h.name }}</strong></td>
                <td><span class="badge badge-success">{{ h.capacity }} Seats</span></td>
                <td>
                    <a href="{{ url_for('delete_hall', hall_id=h.id) }}" class="btn btn-sm btn-danger" style="background-color: var(--danger-color);" onclick="return confirm('Are you sure you want to delete this hall?');">
                        <i class="fa-solid fa-trash"></i> Delete
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" style="text-align: center; color: var(--text-secondary);">No halls found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
