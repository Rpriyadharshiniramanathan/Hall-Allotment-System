{% extends "layout.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Classes</h1>
</div>

<div class="form-card">
    <h3 style="margin-bottom: 1.5rem;">Add New Class</h3>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Select Department</label>
            <select name="department_id" class="form-control" required>
                <option value="">-- Select Department --</option>
                {% for d in departments %}
                <option value="{{ d.id }}">{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Class Name</label>
            <input type="text" name="name" class="form-control" required placeholder="e.g., CS-A 1st Year">
        </div>
        <button type="submit" class="btn btn-primary">Add Class</button>
    </form>
</div>

<div class="table-card">
    <table class="table">
        <thead>
            <tr>
                <th>Class Name</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for c in classes %}
            <tr>
                <td>{{ c.name }}</td>
                <td>{{ c.department_name }}</td>
                <td>
                    <a href="{{ url_for('edit_class', class_id=c.id) }}" class="btn btn-sm btn-secondary" style="background-color: var(--accent-color); border: none;">
                        <i class="fa-solid fa-pen"></i> Edit
                    </a>
                    <a href="{{ url_for('delete_class', class_id=c.id) }}" class="btn btn-sm btn-danger" style="background-color: var(--danger-color); border: none; margin-left: 0.5rem;" onclick="return confirm('Are you sure you want to delete this class? This will also delete ALL students in this class.');">
                        <i class="fa-solid fa-trash"></i> Delete
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" style="text-align: center; color: var(--text-secondary);">No classes found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
